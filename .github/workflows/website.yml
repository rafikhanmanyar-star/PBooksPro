name: Website CI

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/website.yml'
  pull_request:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/website.yml'

concurrency:
  group: website-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm ci

      - name: Build production website
        run: npm run build

      - name: Smoke test dist
        run: npm run smoke

  lighthouse:
    runs-on: ubuntu-latest
    needs: build-and-smoke
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm ci

      - name: Build production website
        run: npm run build

      - name: Start static server
        run: |
          npx http-server dist -p 8765 -c-1 &
          sleep 2

      - name: Run Lighthouse CI
        run: npm run lighthouse:ci
        env:
          BASE_URL: http://127.0.0.1:8765

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: doc/LIGHTHOUSE_REPORT.md
