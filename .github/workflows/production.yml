name: Production CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: production-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build:backend

      - name: Run backend tests
        run: npm run test:backend

      - name: Build frontend (API client mode)
        run: npm run build
        env:
          VITE_LOCAL_ONLY: "false"
          VITE_ELECTRON_BUILD: "true"
