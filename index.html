<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <script>
    (function () {
      try {
        var s = localStorage.getItem('theme');
        var t;
        if (s === 'light' || s === 'dark') {
          t = s;
        } else if (s === 'system' || !s) {
          t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        } else {
          t = 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', t === 'dark' ? '#0f172a' : '#f8fafc');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="app-build-version" content="dev" />
  <link rel="icon" type="image/x-icon" href="/icon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PBooks Pro</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#374151" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PBooks Pro">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- QuickBooks-style geometric sans-serif font (Avenir-like) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <!-- Barcode font for invoices -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    /* QuickBooks-style font stack with system fallbacks */
    @font-face {
      font-family: 'IDAutomationHC39M';
      src: url('https://fonts.gstatic.com/s/robotomono/v22/L0xuDF4xlVMF-BfR8bXMIhJHg45mwgGEFl0_3vq_SeW4Ep0.woff2') format('woff2');
      /* Fallback: Use monospace if barcode font not available */
      font-display: swap;
    }

    /* Use monospace as fallback for barcode font */
    .barcode-font {
      font-family: 'IDAutomationHC39M', 'Courier New', 'Courier', monospace;
      font-weight: normal;
      letter-spacing: 0.1em;
    }

    body {
      font-family: 'Nunito', 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      overscroll-behavior-y: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      user-select: none;
      -webkit-user-select: none;
      /* QuickBooks-style typography */
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary, #374151);
    }

    /* Ensure inputs always accept keyboard and selection (overrides body user-select in all environments including Electron) */
    body input,
    body textarea,
    body select,
    body [contenteditable] {
      user-select: text;
      -webkit-user-select: text;
      cursor: text;
    }

    * {
      -webkit-tap-highlight-color: transparent;
    }

    button:focus {
      outline: none;
    }

    button,
    a,
    [role="button"] {
      cursor: pointer;
    }
  </style>
  <!-- Note: CSS is imported in index.tsx (line 4) and automatically injected by Vite -->
  <!-- Browser dev tools may show a warning, but this is a false positive -->
  <!-- The CSS file loads correctly via the JavaScript import -->
</head>

<body class="bg-background" tabindex="-1">
  <div id="root"></div>
  <script>
    (function() {
      var vv = window.visualViewport;
      var iw = Math.round(vv && vv.width ? vv.width : window.innerWidth);
      var ih = Math.round(vv && vv.height ? vv.height : window.innerHeight);
      var sw = window.screen ? window.screen.width : iw;
      var sh = window.screen ? window.screen.height : ih;
      var compact = sw <= 1400 || sh <= 800;
      var mobile = iw <= 767;
      var tablet = !mobile && iw <= 1023;
      var bp = mobile ? 'mobile' : tablet ? 'tablet' : 'desktop';
      var root = document.documentElement;
      root.style.setProperty('--viewport-compact', compact ? '1' : '0');
      root.style.setProperty('--viewport-mobile', mobile ? '1' : '0');
      root.style.setProperty('--viewport-inner-width', iw + 'px');
      root.style.setProperty('--viewport-inner-height', ih + 'px');
      root.style.setProperty('--sidebar-width', compact ? '14rem' : '16rem');
      root.style.setProperty('--content-padding', compact ? '0.5rem' : '1rem');
      root.style.setProperty('--content-padding-lg', compact ? '0.75rem' : '1.5rem');
      root.dataset.viewportCompact = compact ? 'true' : 'false';
      root.dataset.viewport = bp;
      root.dataset.mobileViewport = mobile ? 'true' : 'false';
      root.dataset.executiveViewport = (mobile || (tablet && ih > iw)) ? 'true' : 'false';
    })();
  </script>
  <script>
    // In Electron: unregister any stale service workers (e.g. from previous web session)
    // to prevent "Offline / app is not cached" when loading from file://
    if (window.electronAPI?.isElectron && 'serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }
    // PWA service worker: production web builds only (%PBOOKS_ENABLE_SW% replaced at build time).
    // Dev server unregisters stale workers so Vite HMR is not intercepted.
    if ('serviceWorker' in navigator && !window.electronAPI?.isElectron) {
      if ('%PBOOKS_ENABLE_SW%' === 'true') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js', { scope: './', updateViaCache: 'none' })
            .then((registration) => {
              console.log('ServiceWorker registration successful');
              registration.update().catch(() => {});
            })
            .catch(err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      } else {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
    }
  </script>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
